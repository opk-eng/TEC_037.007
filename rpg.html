<script>
    let hpBoss = 300;
    let hpHeroi = 100;
    let manaHeroi = 100;
    let manaGastaTotal = 0;
    let acao;

    alert("O Chefe Surgiu: 300hp")
    for (let turno = 1; turno <= 15; turno++) {
        if (hpBoss <= 0) {
            alert("O Boss foi Derrotado!")
            break;
        }
        // retorna 0, 1 ou 2. Soma para trazer 1, 2 ou 3
        //acao = Math.floor(Math.random() * 3) + 1
        let menu = "Escolha sua ação: \n"
                    + " 1 - Ataque Básico \n"
                    + " 2 - Skill \n"
                    + " 3 - Ultimate \n"
                    + " 4 - Potion \n";
        let escolha = prompt(menu);
        let acao = parseInt(escolha);

        ("Ação: " + acao)
        switch(acao) {
            case 1:
                alert("Ataque Básico. 20 dano");
                // hpBoss = hpBoss - 20;
                hpBoss -= 20;
                break;
            case 2:
                if (manaHeroi >= 30) {
                    alert("Skill. 50 dano");
                    hpBoss -= 50;
                    manaHeroi -= 30;
                    manaGastaTotal += 30;
                } else {
                    alert("Mana insuficiente!");
                }
                break;
            case 3:
                if (manaGastaTotal >= 50) {
                    alert("Ultimate. 150 dano");
                    hpBoss -= 150;
                    manaGastaTotal = 0;
                } else {
                    alert("Ultimate não carregada!");
                }
                break;
            case 4:
                if (Math.random() > 0.6) {
                    hpHeroi += 50;
                }
                break;
            }
        manaHeroi += 5;

        if (hpBoss > 0) {
            let sorte = Math.random();
            alert(sorte)
            if (sorte >= 0.5) {
                let danoBoss = 15;
                if (sorte >= 0.8) {
                    danoBoss = 35;
                }
                hpHeroi -= danoBoss
                alert("O Boss atacou com " + danoBoss)
            }
        }
        
        alert("HP Boss: " + hpBoss + "\n Mana:" + manaHeroi + "\n HP Herói: " + hpHeroi);
    }
    if (hpBoss <= 0) { 
        alert("Vitória");
    } else {
        alert("Missão Falhou! O Boss continua vivo.");
    }
</script>
